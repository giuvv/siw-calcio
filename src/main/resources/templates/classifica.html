<!DOCTYPE html>
<html lang="it" xmlns:th="http://www.thymeleaf.org" xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head th:replace="~{fragments/layout :: head('Classifica')}"></head>
<body>
    <nav th:replace="~{fragments/layout :: navbar}"></nav>

    <div class="container">
        <h1>Classifica</h1>
        <p class="text-muted">Torneo: <strong th:text="${torneo.nome}"></strong></p>
        
        <table>
            <thead>
                <tr>
                    <th>Pos</th>
                    <th>Squadra</th>
                    <th style="text-align: center;">Punti</th>
                </tr>
            </thead>
            <tbody>
                <tr th:each="entry, iter : ${classifica}">
                    <td th:text="${iter.count}">1</td>
                    <td th:text="${entry.key}">Squadra</td>
                    <td style="text-align: center; font-weight: 700;" th:text="${entry.value}">0</td>
                </tr>
            </tbody>
        </table>

        <br>
        <a th:href="@{/torneo/{id}(id=${torneo.id})}" class="btn">Torna al torneo</a>
    </div>

    <footer th:replace="~{fragments/layout :: footer}"></footer>
</body>
</html>
