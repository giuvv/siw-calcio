<!DOCTYPE html>
<html lang="it" xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/layout :: head('Giocatore')}"></head>
<body>
    <nav th:replace="~{fragments/layout :: navbar}"></nav>

    <div class="container container-medium">
        <h1 th:text="${giocatore.id == null ? '+ Nuovo Giocatore' : 'Modifica Giocatore'}">Giocatore</h1>
        
        <form th:action="@{/admin/giocatore/salva}" th:object="${giocatore}" method="post">
            <input type="hidden" th:field="*{id}" />
            
            <div class="form-group">
                <label>Nome</label>
                <input type="text" th:field="*{nome}" />
                <span th:if="${#fields.hasErrors('nome')}" th:errors="*{nome}" class="error-message"></span>
            </div>

            <div class="form-group">
                <label>Cognome</label>
                <input type="text" th:field="*{cognome}" />
                <span th:if="${#fields.hasErrors('cognome')}" th:errors="*{cognome}" class="error-message"></span>
            </div>

            <div class="form-group">
                <label>Data di Nascita</label>
                <input type="date" th:field="*{dataNascita}" />
                <span th:if="${#fields.hasErrors('dataNascita')}" th:errors="*{dataNascita}" class="error-message"></span>
            </div>

            <div class="form-group">
                <label>Ruolo</label>
                <input type="text" th:field="*{ruolo}" placeholder="Es. Attaccante" />
                <span th:if="${#fields.hasErrors('ruolo')}" th:errors="*{ruolo}" class="error-message"></span>
            </div>

            <div class="form-group">
                <label>Altezza</label>
                <input type="number" step="0.01" th:field="*{altezza}" placeholder="Es. 1.78" />
                <span th:if="${#fields.hasErrors('altezza')}" th:errors="*{altezza}" class="error-message"></span>
            </div>

            <div class="form-group">
                <label>Squadra di Appartenenza</label>
                <select th:field="*{squadra}">
                    <option th:each="s : ${squadre}" th:value="${s.id}" th:text="${s.nome}"></option>
                </select>
            </div>

            <div class="form-actions">
                <button type="submit" class="btn btn-primary">Salva Giocatore</button>
                <a th:href="@{/admin/dashboard}" class="btn">Annulla</a>
            </div>
        </form>
    </div>

    <footer th:replace="~{fragments/layout :: footer}"></footer>
</body>
</html>
