<!DOCTYPE html>
<html lang="it" xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/layout :: head('Arbitro')}"></head>
<body>
    <nav th:replace="~{fragments/layout :: navbar}"></nav>

    <div class="container container-narrow">
        <h1 th:text="${arbitro.id == null ? '+ Nuovo Arbitro' : 'Modifica Arbitro'}">Arbitro</h1>
        
        <form th:action="@{/admin/arbitro/salva}" th:object="${arbitro}" method="post">
            <input type="hidden" th:field="*{id}" />
            
            <div class="form-group">
                <label>Nome</label>
                <input type="text" th:field="*{nome}" />
                <span th:if="${#fields.hasErrors('nome')}" th:errors="*{nome}" class="error-message"></span>
            </div>
            
            <div class="form-group">
                <label>Cognome</label>
                <input type="text" th:field="*{cognome}" />
                <span th:if="${#fields.hasErrors('cognome')}" th:errors="*{cognome}" class="error-message"></span>
            </div>
            
            <div class="form-group">
                <label>Codice Arbitrale</label>
                <input type="text" th:field="*{codiceArbitrale}" />
                <span th:if="${#fields.hasErrors('codiceArbitrale')}" th:errors="*{codiceArbitrale}" class="error-message"></span>
            </div>
            
            <div class="form-actions">
                <button type="submit" class="btn btn-primary">Salva</button>
                <a th:href="@{/admin/arbitri}" class="btn">Annulla</a>
            </div>
        </form>
    </div>

    <footer th:replace="~{fragments/layout :: footer}"></footer>
</body>
</html>
