<!DOCTYPE html>
<html lang="it" xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/layout :: head('Login')}"></head>
<body>
    <div class="container container-narrow" style="margin-top: 60px; text-align: center;">
        <h1 style="font-size: 4em; border: none; padding: 0;"></h1>
        <h1>ScoreMaster</h1>
        <p class="text-muted" style="text-transform: uppercase; letter-spacing: 2px; font-size: 0.9em; margin-bottom: 30px;">
            Inserisci le credenziali per accedere
        </p>

        <div th:if="${param.error}" class="alert alert-error">
            Username o password errati. Riprova.
        </div>

        <div th:if="${param.logout}" class="alert alert-success">
            Sei uscito con successo. A presto!
        </div>

        <form th:action="@{/login}" method="post">
            <div class="form-group" style="text-align: left;">
                <label for="username">Username</label>
                <input type="text" id="username" name="username" required autofocus />
            </div>
            
            <div class="form-group" style="text-align: left;">
                <label for="password">Password</label>
                <input type="password" id="password" name="password" required />
            </div>
            
            <button type="submit" class="btn btn-primary btn-block">Accedi</button>
        </form>

        <div style="margin-top: 25px;">
            <a th:href="@{/tornei}">Torna alla Home</a>
        </div>
    </div>
</body>
</html>
