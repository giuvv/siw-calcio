<!DOCTYPE html>
<html lang="it" xmlns:th="http://www.thymeleaf.org" xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head th:replace="~{fragments/layout :: head('Calendario')}"></head>
<body>
    <nav th:replace="~{fragments/layout :: navbar}"></nav>

    <div class="container">
        <h1>Calendario</h1>
        <p class="text-muted">Torneo: <strong th:text="${torneo.nome}"></strong></p>

        <!-- Il calendario è reso da un componente React (vedi /js/calendario.js) -->
        <div id="calendario-react" th:attr="data-torneo-id=${torneo.id}">
            <p class="text-muted">Caricamento partite...</p>
        </div>

        <br>
        <a th:href="@{/torneo/{id}(id=${torneo.id})}" class="btn">Torna al torneo</a>
    </div>

    <footer th:replace="~{fragments/layout :: footer}"></footer>

    <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
    <script src="/js/calendario.js"></script>
</body>
</html>
